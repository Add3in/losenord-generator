<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Andreas superlösenordsgenerator</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;

      background: url("W_4K_-–-3.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,40,90,0.5);
    }

    .smoke {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 60%);
      animation: smokeMove 40s linear infinite;
    }

    @keyframes smokeMove {
      from { transform: translate(-20%, -20%); }
      to   { transform: translate(20%, 20%); }
    }

    .container {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
    }

    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .password {
      font-size: 20px;
      font-family: Consolas, monospace;
      background: white;
      color: black;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      word-break: break-all;
    }

    button {
      padding: 12px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0066cc;
      color: white;
      width: 45%;
    }

    button:hover {
      background: #004999;
    }

    .strength {
      height: 6px;
      background: #ccc;
      border-radius: 5px;
      margin-top: 10px;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: 0.3s;
    }

    .music-btn {
      position: fixed;
      bottom: 15px;
      right: 15px;
      padding: 12px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 18px;
    }

    @media (max-width: 500px) {
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="smoke"></div>

  <div class="container">

    <!-- PROFILBILD -->
    <img src="profil.jpg" alt="profil">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <div class="strength">
      <div id="bar" class="strength-bar"></div>
    </div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

  </div>

  <!-- MUSIK -->
  <audio id="musik" loop>
    <source src="musik.mp3" type="audio/mpeg">
  </audio>

  <div class="music-btn" onclick="toggleMusik()">🔊</div>

  <script>
    const ord = [
      "sol","skog","vatten","berg","vind","eld",
      "stjarna","hav","moln","regn","sno","ljus","morker",
      "sten","himlen","jord","flod","storm","is",
      "dimma","aske","flamma","rost","skugga","natt",
      "dag","ljud","eko","kraft","skydd","signal",
      "kod","data","server","system","cloud","nackel",
      "laser","motor","drift","energi","zon"
    ];

    const special = "!@#$%&*?+-_=:/.";
    
    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(o) {
      return o.charAt(0).toUpperCase() + o.slice(1);
    }

    function styrka(lösen) {
      let score = lösen.length;

      if (/[A-Z]/.test(lösen)) score += 5;
      if (/[!@#$%&*?]/.test(lösen)) score += 5;
      if (/[0-9]/.test(lösen)) score += 5;

      let bar = document.getElementById("bar");

      if (score > 25) {
        bar.style.width = "100%";
        bar.style.background = "green";
      } else if (score > 18) {
        bar.style.width = "70%";
        bar.style.background = "orange";
      } else {
        bar.style.width = "40%";
        bar.style.background = "red";
      }
    }

    function generera() {
      let el = document.getElementById("losenord");

      let antalOrd = Math.random() < 0.5 ? 2 : 3;

      let lösen = "";

      for (let i = 0; i < antalOrd; i++) {
        lösen += storBokstav(slumpa(ord));
      }

      let tal = Math.random() < 0.5
        ? Math.floor(Math.random() * 10)
        : Math.floor(Math.random() * 100);

      lösen += tal;

      lösen += slumpa(special);
      if (Math.random() < 0.4) {
        lösen += slumpa(special);
      }

      el.innerText = lösen;

      styrka(lösen);
    }

    function kopiera() {
      let text = document.getElementById("losenord").innerText;
      navigator.clipboard.writeText(text);
      alert("Kopierat!");
    }

    const musik = document.getElementById("musik");
    let spelar = false;

    function toggleMusik() {
      if (spelar) {
        musik.pause();
        spelar = false;
      } else {
        musik.play();
        spelar = true;
      }
    }

    window.onload = generera;
  </script>

</body>
</html>
