<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Andreas superlösenordsgenerator</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;

      /* ✅ DIN BILD */
      background: url("W_4K_-–-3.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ✅ overlay för bättre text */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 40, 90, 0.5); /* DIF-blå overlay */
    }

    /* 🔥 GLASS + GLOW */
    .container {
      position: relative;

      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);

      padding: 25px;
      border-radius: 20px;
      text-align: center;

      /* 🔥 AI glow effekt */
      box-shadow:
        0 0 20px rgba(0, 102, 204, 0.8),
        0 0 60px rgba(0, 102, 204, 0.6),
        0 10px 40px rgba(0,0,0,0.6);

      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 3px solid #f6c600; /* DIF guld */
      box-shadow: 0 0 15px #f6c600;
    }

    h1 {
      color: #ffffff;
      font-size: 20px;

      /* ✨ glow text */
      text-shadow:
        0 0 10px #0066cc,
        0 0 20px #0066cc,
        0 0 30px #0066cc;
    }

    .password {
      font-size: 20px;
      font-family: monospace;

      background: rgba(255,255,255,0.95);
      padding: 10px;
      border-radius: 10px;
      margin: 15px 0;

      transition: 0.2s;

      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    /* 🔥 pulse glow */
    .pulse {
      transform: scale(1.1);

      box-shadow:
        0 0 20px #00ccff,
        0 0 40px #00ccff;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;

      background: linear-gradient(45deg, #0066cc, #0099ff);
      color: white;
      font-weight: bold;

      transition: 0.2s;

      box-shadow: 0 0 10px rgba(0,150,255,0.6);
    }

    button:hover {
      transform: scale(1.08);

      box-shadow:
        0 0 20px rgba(0,150,255,1),
        0 0 40px rgba(0,150,255,0.8);
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ✅ PROFILBILD -->
    <img src="profil.jpg" alt="profil">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

  </div>

  <script>
    const ord = [
      "sol", "skog", "vatten", "berg", "vind", "eld",
      "stjarna", "hav", "moln", "regn", "sno", "ljus",
      "morker", "blad", "rot"
    ];

    const special = "!@#$%&*?";

    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(ord) {
      return ord.charAt(0).toUpperCase() + ord.slice(1);
    }

    function generera() {
      let el = document.getElementById("losenord");

      let lösen = storBokstav(slumpa(ord)) + storBokstav(slumpa(ord));

      if (Math.random() < 0.4) {
        lösen += storBokstav(slumpa(ord));
      }

      lösen += Math.floor(Math.random() * 10);
      lösen += slumpa(special);

      el.innerText = lösen;

      el.classList.add("pulse");
      setTimeout(() => el.classList.remove("pulse"), 200);
    }

    function kopiera() {
      const text = document.getElementById("losenord").innerText;
      navigator.clipboard.writeText(text);
      alert("Kopierat!");
    }

    window.onload = generera;
  </script>

</body>
</html>
