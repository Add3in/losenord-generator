<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Andreas superlösenordsgenerator</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #6a85b6, #bac8e0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: rgba(255,255,255,0.95);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 350px;
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 15px;
    }

    .password {
      font-size: 20px;
      font-family: monospace;
      background: #eee;
      padding: 10px;
      border-radius: 10px;
      margin: 15px 0;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #6a85b6;
      color: white;
    }

    button:hover {
      background: #5a72a0;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ✅ BILD (ändra till exakt ditt filnamn!) -->
    <img src="profil.jpg" alt="profilbild">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

  </div>

  <script>
    const ord = [
      "sol", "skog", "vatten", "berg", "vind", "eld",
      "stjarna", "hav", "moln", "regn", "sno", "ljus",
      "morker", "blad", "rot"
    ];

    const special = "!@#$%&*?";

    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(ord) {
      return ord.charAt(0).toUpperCase() + ord.slice(1);
    }

    function generera() {
      let lösen = storBokstav(slumpa(ord)) + storBokstav(slumpa(ord));

      if (Math.random() < 0.4) {
        lösen += storBokstav(slumpa(ord));
      }

      lösen += Math.floor(Math.random() * 10);
      lösen += slumpa(special);

      document.getElementById("losenord").innerText = lösen;
    }

    function kopiera() {
      const text = document.getElementById("losenord").innerText;
      navigator.clipboard.writeText(text);
      alert("Kopierat!");
    }

    window.onload = generera;
  </script>

</body>
</html>
