<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Andreas superlösenordsgenerator</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;

      background: url("W_4K_-–-3.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,40,90,0.5);
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
    }

    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      color: white;
      font-size: 16px;
    }

    .password {
      font-size: 20px;
      font-family: monospace;
      background: white;
      color: black;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      transition: 0.2s;
    }

    /* ✅ grönt blink vid kopiering */
    .copied {
      background: #c8f7c5;
    }

    button {
      padding: 12px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0066cc;
      color: white;
      width: 45%;
    }

    .full-btn {
      width: 90%;
    }

    select {
      margin-top: 10px;
      padding: 8px;
      border-radius: 5px;
      width: 90%;
    }

    .strength {
      height: 6px;
      background: #ccc;
      border-radius: 5px;
      margin-top: 10px;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: 0.3s;
    }

    @media (max-width: 500px) {
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="profil.jpg">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <!-- ✅ STYRKEBAR -->
    <div class="strength">
      <div id="bar" class="strength-bar"></div>
    </div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

    <!-- ✅ INSTÄLLNINGAR -->
    <select id="ordCount">
      <option value="2">2 ord</option>
      <option value="3" selected>3 ord</option>
      <option value="4">4 ord</option>
      <option value="5">5 ord</option>
    </select>

  </div>

  <script>
    const ord = [
      "sol","skog","vatten","berg","vind","eld",
      "stjarna","hav","moln","regn","sno","ljus",
      "morker","sten","jord","storm","natt",
      "data","system","kod","signal"
    ];

    const special = [
      "!", "@", "#", "$", "%", "&", "*", "?",
      "+", "-", "_", "=", ":", ".", "/",
      "(", ")", "<", ">"
    ];

    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(o) {
      return o.charAt(0).toUpperCase() + o.slice(1);
    }

    function styrka(lösen) {
      let score = lösen.length;

      if (/[A-Z]/.test(lösen)) score += 5;
      if (/[0-9]/.test(lösen)) score += 5;
      if (/[!@#$%&*?]/.test(lösen)) score += 5;

      let bar = document.getElementById("bar");

      if (score > 30) {
        bar.style.width = "100%";
        bar.style.background = "green";
      } else if (score > 20) {
        bar.style.width = "70%";
        bar.style.background = "orange";
      } else {
        bar.style.width = "40%";
        bar.style.background = "red";
      }
    }

    function generera() {
      let el = document.getElementById("losenord");

      let antalOrd = document.getElementById("ordCount").value;

      let lösen = "";

      for (let i = 0; i < antalOrd; i++) {
        lösen += storBokstav(slumpa(ord));
      }

      lösen += Math.floor(Math.random() * 100);
      lösen += slumpa(special);

      el.innerText = lösen;

      styrka(lösen);
    }

    function kopiera() {
      let el = document.getElementById("losenord");
      navigator.clipboard.writeText(el.innerText);

      // ✅ VISUELL FEEDBACK ISTÄLLET FÖR ALERT
      el.classList.add("copied");

      setTimeout(() => {
        el.classList.remove("copied");
      }, 500);
    }

    window.onload = generera;
  </script>

</body>
</html>
``
