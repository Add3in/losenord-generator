<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Andreas superlösenordsgenerator</title>

  <!-- ✅ SNYGG FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;

      background: url("W_4K_-–-3.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ✅ BLÅ OVERLAY */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,40,90,0.55);
    }

    /* 🔥 RÖK-EFFEKT */
    .smoke {
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
      animation: smokeMove 30s linear infinite;
      pointer-events: none;
    }

    @keyframes smokeMove {
      from {
        transform: translate(-20%, -20%);
      }
      to {
        transform: translate(20%, 20%);
      }
    }

    /* ✅ KORT */
    .container {
      position: relative;
      z-index: 2;

      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);

      padding: 25px;
      border-radius: 20px;
      text-align: center;

      box-shadow:
        0 0 20px #0066cc,
        0 0 60px rgba(0,102,204,0.5);
    }

    /* ✅ PROFILBILD */
    img {
      width: 120px;
      border-radius: 50%;
      border: 3px solid #f6c600;
      box-shadow: 0 0 20px #f6c600;
    }

    /* 🔥 SNYGG TITEL */
    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #ffffff;
      font-size: 18px;
      letter-spacing: 1px;

      text-shadow:
        0 0 10px #0066cc,
        0 0 20px #0066cc;
    }

    /* ✅ NY: TYDLIG LÖSENORDSTEXT */
    .password {
      font-size: 22px;
      font-family: Consolas, monospace;
      background: rgba(255,255,255,0.95);
      color: black;

      padding: 12px;
      border-radius: 10px;
      margin: 15px 0;

      letter-spacing: 1px;

      /* glow utan att förstöra text */
      box-shadow: 0 0 10px rgba(255,255,255,0.6);

      transition: transform 0.2s;
    }

    .pulse {
      transform: scale(1.08);
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;

      background: linear-gradient(45deg,#0066cc,#00ccff);
      color: white;
      font-weight: bold;

      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px #00ccff;
    }

    /* ✅ STYRKEBAR */
    .strength {
      height: 8px;
      border-radius: 5px;
      background: #ccc;
      margin-top: 10px;
    }

    .strength-bar {
      height: 100%;
      border-radius: 5px;
      width: 0%;
      background: red;
      transition: 0.3s;
    }
  </style>
</head>

<body>

  <!-- 🔥 RÖK -->
  <div class="smoke"></div>

  <div class="container">

    <!-- ✅ PROFILBILD -->
    <img src="profil.jpg" alt="profil">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <div class="strength">
      <div id="bar" class="strength-bar"></div>
    </div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

  </div>

  <script>
    const ord = [
      "sol","skog","vatten","berg","vind","eld",
      "stjarna","hav","moln","regn","sno","ljus","morker"
    ];

    const special = "!@#$%&*?";

    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(o) {
      return o.charAt(0).toUpperCase() + o.slice(1);
    }

    function styrka(lösen) {
      let score = lösen.length;

      if (/[A-Z]/.test(lösen)) score += 5;
      if (/[!@#$%&*?]/.test(lösen)) score += 5;
      if (/[0-9]/.test(lösen)) score += 5;

      let bar = document.getElementById("bar");

      if (score > 25) {
        bar.style.width = "100%";
        bar.style.background = "green";
      } else if (score > 18) {
        bar.style.width = "70%";
        bar.style.background = "orange";
      } else {
        bar.style.width = "40%";
        bar.style.background = "red";
      }
    }

    function generera() {
      let el = document.getElementById("losenord");

      let lösen = storBokstav(slumpa(ord)) + storBokstav(slumpa(ord));

      if (Math.random() < 0.4) {
        lösen += storBokstav(slumpa(ord));
      }

      lösen += Math.floor(Math.random() * 10);
      lösen += slumpa(special);

      el.innerText = lösen;

      el.classList.add("pulse");
      setTimeout(() => el.classList.remove("pulse"), 200);

      styrka(lösen);
    }

    function kopiera() {
      let text = document.getElementById("losenord").innerText;
      navigator.clipboard.writeText(text);

      alert("Kopierat!");
    }

    window.onload = generera;
  </script>

</body>
</html>
``
