<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Andreas superlösenordsgenerator</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;

      background: url("W_4K_-–-3.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* overlay */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,40,90,0.4);
      z-index: 1;
    }

    /* ✅ NY RÖK (MYCKET TYDLIGARE) */
    .smoke {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .smoke::before,
    .smoke::after {
      content: "";
      position: absolute;
      width: 180%;
      height: 180%;
      background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 60%);
      filter: blur(25px);
    }

    /* lager 1 */
    .smoke::before {
      animation: smoke1 35s linear infinite;
      opacity: 0.6;
    }

    /* lager 2 */
    .smoke::after {
      animation: smoke2 50s linear infinite;
      opacity: 0.5;
    }

    @keyframes smoke1 {
      0%   { transform: translate(-30%, -30%) scale(1); }
      50%  { transform: translate(10%, 10%) scale(1.2); }
      100% { transform: translate(30%, 30%) scale(1); }
    }

    @keyframes smoke2 {
      0%   { transform: translate(30%, -20%) scale(1.1); }
      50%  { transform: translate(-10%, 20%) scale(1.3); }
      100% { transform: translate(-30%, 40%) scale(1.1); }
    }

    /* kort */
    .container {
      position: relative;
      z-index: 3;

      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);

      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
    }

    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .password {
      font-size: 20px;
      font-family: Consolas, monospace;
      background: white;
      color: black;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
      word-break: break-all;
    }

    button {
      padding: 12px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0066cc;
      color: white;
      width: 45%;
    }

    button:hover {
      background: #004999;
    }

    .strength {
      height: 6px;
      background: #ccc;
      border-radius: 5px;
      margin-top: 10px;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      border-radius: 5px;
      transition: 0.3s;
    }

    .music-btn {
      position: fixed;
      bottom: 15px;
      right: 15px;
      padding: 12px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 18px;
      cursor: pointer;
      z-index: 4;
    }

    @media (max-width: 500px) {
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="smoke"></div>

  <div class="container">

    <img src="profil.jpg">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <div class="strength">
      <div id="bar" class="strength-bar"></div>
    </div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

  </div>

  <script>
    function generera() {
      document.getElementById("losenord").innerText = "Test123!";
    }

    window.onload = generera;
  </script>

</body>
</html>
