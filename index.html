<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Andreas superlösenordsgenerator</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;

      background: url("W_4K_-–-3.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* overlay */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,40,90,0.5);
    }

    .container {
      position: relative;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
      padding: 25px;
      border-radius: 20px;
      text-align: center;

      box-shadow:
        0 0 20px #0066cc,
        0 0 60px #0066cc;

      animation: fadeIn 1s ease;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 🔥 glow border animation */
    .container::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 20px;
      background: linear-gradient(45deg, #0066cc, #00ccff, #0066cc);
      z-index: -1;
      filter: blur(10px);
      animation: glowMove 4s linear infinite;
    }

    @keyframes glowMove {
      0% { filter: blur(10px) hue-rotate(0deg);}
      100% { filter: blur(10px) hue-rotate(360deg);}
    }

    img {
      width: 120px;
      border-radius: 50%;
      border: 3px solid #f6c600;
      box-shadow: 0 0 20px #f6c600;
    }

    h1 {
      color: white;
      text-shadow: 0 0 15px #0066cc;
    }

    .password {
      font-size: 22px;
      font-family: monospace;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 10px;
      margin: 15px 0;
      position: relative;
    }

    /* ⚡ glitch text */
    .glitch {
      color: black;
      position: relative;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      color: black;
    }

    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 red;
      animation: glitch1 0.2s infinite;
    }

    .glitch::after {
      left: -2px;
      text-shadow: -2px 0 blue;
      animation: glitch2 0.2s infinite;
    }

    @keyframes glitch1 {
      0% { top: 0; }
      50% { top: -2px; }
      100% { top: 0; }
    }

    @keyframes glitch2 {
      0% { top: 0; }
      50% { top: 2px; }
      100% { top: 0; }
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(45deg,#0066cc,#00ccff);
      color: white;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.1);
    }

    /* 🧠 strength meter */
    .strength {
      height: 8px;
      border-radius: 5px;
      background: #ccc;
      margin-top: 10px;
    }

    .strength-bar {
      height: 100%;
      border-radius: 5px;
      width: 0%;
      background: red;
      transition: 0.3s;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="profil.jpg" alt="profil">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password glitch"></div>

    <div class="strength">
      <div id="bar" class="strength-bar"></div>
    </div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

  </div>

  <script>
    const ord = [
      "sol","skog","vatten","berg","vind","eld",
      "stjarna","hav","moln","regn","sno","ljus","morker"
    ];

    const special = "!@#$%&*?";

    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(o) {
      return o.charAt(0).toUpperCase() + o.slice(1);
    }

    function styrka(lösen) {
      let score = lösen.length;

      if (/[A-Z]/.test(lösen)) score += 5;
      if (/[!@#$%&*?]/.test(lösen)) score += 5;
      if (/[0-9]/.test(lösen)) score += 5;

      let bar = document.getElementById("bar");

      if (score > 25) {
        bar.style.width = "100%";
        bar.style.background = "green";
      } else if (score > 18) {
        bar.style.width = "70%";
        bar.style.background = "orange";
      } else {
        bar.style.width = "40%";
        bar.style.background = "red";
      }
    }

    function generera() {
      let el = document.getElementById("losenord");

      let lösen = storBokstav(slumpa(ord)) + storBokstav(slumpa(ord));

      if (Math.random() < 0.4) {
        lösen += storBokstav(slumpa(ord));
      }

      lösen += Math.floor(Math.random() * 10);
      lösen += slumpa(special);

      el.innerText = lösen;
      el.setAttribute("data-text", lösen);

      styrka(lösen);
    }

    function kopiera() {
      let text = document.getElementById("losenord").innerText;
      navigator.clipboard.writeText(text);

      // 🎉 konfetti
      for (let i = 0; i < 40; i++) {
        let div = document.createElement("div");
        div.style.position = "fixed";
        div.style.width = "6px";
        div.style.height = "6px";
        div.style.background = "gold";
        div.style.left = Math.random()*100 + "vw";
        div.style.top = "0";
        div.style.zIndex = "9999";

        document.body.appendChild(div);

        let fall = div.animate([
          { transform: "translateY(0)" },
          { transform: "translateY(100vh)" }
        ], { duration: 1000 + Math.random()*1000 });

        fall.onfinish = () => div.remove();
      }
    }

    window.onload = generera;
  </script>

</body>
</html>
