<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Andreas superlösenordsgenerator</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      height: 100vh;

      /* ✅ DIN BAKGRUNDSBILD */
      background: url("bakgrund.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔥 GLASS/KORT */
    .container {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);

      text-align: center;
      max-width: 350px;

      /* animation in */
      animation: fadeIn 0.8s ease;
    }

    /* ✨ fade in */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 20px;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.7);
    }

    .password {
      font-size: 20px;
      font-family: monospace;
      background: rgba(255,255,255,0.8);
      padding: 10px;
      border-radius: 10px;
      margin: 15px 0;

      /* 🔥 animation när nytt lösenord */
      transition: transform 0.2s, background 0.2s;
    }

    .pulse {
      transform: scale(1.1);
      background: #d4f0ff;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #007bff;
      color: white;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #0056b3;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- ✅ PROFILBILD -->
    <img src="profil.jpg" alt="profil">

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

  </div>

  <script>
    const ord = [
      "sol", "skog", "vatten", "berg", "vind", "eld",
      "stjarna", "hav", "moln", "regn", "sno", "ljus",
      "morker", "blad", "rot"
    ];

    const special = "!@#$%&*?";

    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(ord) {
      return ord.charAt(0).toUpperCase() + ord.slice(1);
    }

    function generera() {
      let el = document.getElementById("losenord");

      let lösen = storBokstav(slumpa(ord)) + storBokstav(slumpa(ord));

      if (Math.random() < 0.4) {
        lösen += storBokstav(slumpa(ord));
      }

      lösen += Math.floor(Math.random() * 10);
      lösen += slumpa(special);

      el.innerText = lösen;

      // 🔥 liten animation
      el.classList.add("pulse");
      setTimeout(() => el.classList.remove("pulse"), 200);
    }

    function kopiera() {
      const text = document.getElementById("losenord").innerText;
      navigator.clipboard.writeText(text);
      alert("Kopierat!");
    }

    window.onload = generera;
  </script>

</body>
</html>
