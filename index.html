<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Andreas superlösenordsgenerator</title>

  https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;

      background: url("W_4K_-–-3.png") no-repeat center center fixed;
      background-size: cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,40,90,0.5);
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
    }

    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: white;
      font-size: 16px;
    }

    .password {
      font-size: 20px;
      font-family: Consolas, monospace;
      background: white;
      color: black;
      padding: 12px;
      border-radius: 8px;
      margin: 15px 0;
    }

    button {
      padding: 12px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0066cc;
      color: white;
      width: 45%;
    }

    .control-btn {
      width: 90%;
      margin-top: 10px;
      background: #333;
    }

    .music-btn {
      position: fixed;
      bottom: 15px;
      right: 15px;
      padding: 12px;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: white;
      cursor: pointer;
    }

    /* ✅ STRENGTH */
    .strength {
      height: 6px;
      background: #444;
      border-radius: 5px;
      margin-top: 8px;
      overflow: hidden;
    }

    .strength-bar {
      height: 100%;
      width: 0%;
      transition: 0.3s;
    }

    /* ✅ NY TEXT */
    .strength-text {
      margin-top: 8px;
      font-size: 14px;
      color: white;
    }

    @media (max-width: 500px) {
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    profil.jpg

    <h1>Andreas superlösenordsgenerator</h1>

    <div id="losenord" class="password"></div>

    <div class="strength">
      <div id="bar" class="strength-bar"></div>
    </div>

    <!-- ✅ NY TEXT -->
    <div id="strengthText" class="strength-text">Strength: -</div>

    <button onclick="generera()">Generera</button>
    <button onclick="kopiera()">Kopiera</button>

    <button class="control-btn" onclick="bytBakgrund()">Byt bakgrund</button>

  </div>

  musik.mp3</audio>

  <div class="music-btn" onclick="toggleMusik()">🔊</div>

  <script>
    const backgrounds = [
      "W_4K_-–-3.png",
      "bakgrund2.jpg",
      "bakgrund3.jpg"
    ];

    let currentBg = 0;

    function bytBakgrund() {
      currentBg++;
      if (currentBg >= backgrounds.length) currentBg = 0;

      document.body.style.background =
        `url("${backgrounds[currentBg]}") no-repeat center center fixed`;

      document.body.style.backgroundSize = "cover";
    }

    const ord = [
      "sol","skog","vatten","berg","vind","eld",
      "stjarna","hav","moln","regn","sno","ljus",
      "morker","sten","jord","storm","natt",
      "data","system","kod","signal"
    ];

    const special = [
      "!", "@", "#", "$", "%", "&", "*", "?",
      "+", "-", "_", "=", ":", ".", "/",
      "(", ")", "<", ">"
    ];

    function slumpa(lista) {
      return lista[Math.floor(Math.random() * lista.length)];
    }

    function storBokstav(o) {
      return o.charAt(0).toUpperCase() + o.slice(1);
    }

    function styrka(lösen) {
      let score = lösen.length;

      if (/[A-Z]/.test(lösen)) score += 5;
      if (/[0-9]/.test(lösen)) score += 5;
      if (/[!@#$%&*?]/.test(lösen)) score += 5;

      let bar = document.getElementById("bar");
      let text = document.getElementById("strengthText");

      if (score > 30) {
        bar.style.width = "100%";
        bar.style.background = "#00ff66";
        bar.style.boxShadow = "0 0 10px #00ff66, 0 0 20px #00ff66";

        text.innerText = "INSANE 🔥";
        text.style.color = "#00ff66";
      } 
      else if (score > 20) {
        bar.style.width = "70%";
        bar.style.background = "orange";
        bar.style.boxShadow = "none";

        text.innerText = "Strong ✅";
        text.style.color = "orange";
      } 
      else {
        bar.style.width = "40%";
        bar.style.background = "red";
        bar.style.boxShadow = "none";

        text.innerText = "Weak ⚠️";
        text.style.color = "red";
      }
    }

    function generera() {
      let lösen =
        storBokstav(slumpa(ord)) +
        storBokstav(slumpa(ord));

      if (Math.random() < 0.4) {
        lösen += storBokstav(slumpa(ord));
      }

      lösen += Math.floor(Math.random() * 100);
      lösen += slumpa(special);

      document.getElementById("losenord").innerText = lösen;

      styrka(lösen);
    }

    function kopiera() {
      navigator.clipboard.writeText(
        document.getElementById("losenord").innerText
      );
      alert("Kopierat!");
    }

    const musik = document.getElementById("musik");
    let spelar = false;

    function toggleMusik() {
      if (spelar) {
        musik.pause();
        spelar = false;
      } else {
        musik.play();
        spelar = true;
      }
    }

    window.onload = generera;
  </script>

</body>
</html>
